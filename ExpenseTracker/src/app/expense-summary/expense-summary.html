<div class="expense-list">
  <h2>Recent Transactions</h2>
<div style="overflow-y: auto; max-height: 400px; display: block; white-space: nowrap;">
<table style="min-height: 200px; margin-bottom: 20px;">
    <thead>
      <tr>
        <th>Description</th>
        <th>Category</th>
        <th>Amount</th>
        <th>Date</th>
        <th>Actions</th>
      </tr>
    </thead>
    <tbody>
      @for (user of userData; track user.id) {
      <tr>
        <td>{{ user.title }}</td>
        <td>{{ user.category }}</td>
        <td>{{ user.amount }}</td>
        <td style="width: 100% !important;">{{ user.date }}</td>
        <td>
          <div class="btnCls">
            <button (click) ="onEdit(user)">Edit</button>
            <button (click)="deleteItem(user.id)">Delete</button>
          </div>
        </td>
      </tr>
      }
    </tbody>
  </table>
</div>
    

  
  <br />
  <hr />
  <div style="display: flex; gap: 10px">
    <div style="display: block; background-color: green; padding: 10px; border-radius: 20px">
      <h4>Total Expense</h4>
      <br />
      <div>{{ totalExpense | currency: 'INR' }}</div>
    </div>
    <div style="display: block; background-color: orange; padding: 10px; border-radius: 20px">
      <h4>Monthly Budget</h4>
      <br />
      <div>{{ 60000 | currency: 'INR' }}</div>
    </div>
  </div>
</div>
